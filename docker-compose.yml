  ewm-db:
    image: postgres:16.1
    container_name: postgres-ewm-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=user
      - POSTGRES_DB=ewm-main
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d ewm-main" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ewm-network

networks:
  ewm-network:
    driver: bridge