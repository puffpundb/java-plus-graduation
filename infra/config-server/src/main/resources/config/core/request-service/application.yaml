spring:
  application:
    name: request-service
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:8765/request-service
    username: user
    password: password

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      enabled: true

feign:
  httpclient:
    enabled: true

resilience4j.retry:
  instances:
    requestServiceRetry:
      maxRetryAttempts: 5
      waitDuration: 1000ms
      retryExceptions:
        - feign.FeignException.InternalServerError
        - feign.FeignException.ServiceUnavailable
        - java.io.IOException
        - java.net.SocketTimeoutException